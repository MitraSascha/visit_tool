services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: card_vault
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: card_vault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - card-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U card_vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://card_vault:${DB_PASSWORD}@postgres:5432/card_vault
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      UPLOAD_DIR: /app/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HERO_API_URL: ${HERO_API_URL}
      HERO_API_TOKEN: ${HERO_API_TOKEN}
      HERO_PARTNER_ID: ${HERO_PARTNER_ID}
    volumes:
      - uploads:/app/uploads
    networks:
      - card-internal
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7842:80"
    networks:
      - card-internal
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:

networks:
  card-internal:
    driver: bridge
