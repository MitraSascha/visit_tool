<div class="viewer-wrapper" [class.viewer-wrapper--expanded]="expanded()">

  <!-- Backdrop (nur im Fullscreen) -->
  @if (expanded()) {
    <div class="viewer-backdrop" (click)="toggleExpanded()"></div>
  }

  <div class="viewer-inner">
    <canvas #canvas class="viewer-canvas"></canvas>

    <!-- Fullscreen-Button -->
    <button
      class="viewer-btn viewer-btn--expand"
      [title]="expanded() ? 'Verkleinern' : 'Vergrößern'"
      (click)="toggleExpanded()"
      type="button"
    >
      @if (expanded()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 0 2-2h3M3 16h3a2 2 0 0 0 2 2v3"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      }
    </button>

    <div class="viewer-hint">
      <span class="hint-icon">↔</span> Ziehen zum Drehen
    </div>

    <!-- Scroll-Zone: Nur auf Mobile (< 480px). touch-action: pan-y erlaubt
         vertikales Scrollen zu den Formularfeldern, da der Canvas touch-action: none hat. -->
    @if (!expanded()) {
      <div class="viewer-scroll-zone" aria-hidden="true">
        <span class="scroll-hint-text">↓ Wischen für Details</span>
      </div>
    }
  </div>

</div>
