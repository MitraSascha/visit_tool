<div class="login-page">
  <div class="login-card">

    <!-- Logo / Titel -->
    <div class="login-brand">
      <div class="brand-icon">🗂</div>
      <h1 class="brand-name">card-vault</h1>
      <p class="brand-sub">Partnerkontakte & Dienstleister</p>
    </div>

    <!-- Formular -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>

      <div class="field">
        <label for="email" class="field__label">E-Mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="field__input"
          [class.field__input--error]="form.controls.email.invalid && form.controls.email.touched"
          placeholder="name@firma.de"
          autocomplete="email"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span class="field__error">Gültige E-Mail erforderlich</span>
        }
      </div>

      <div class="field">
        <label for="password" class="field__label">Passwort</label>
        <div class="field__input-wrap">
          <input
            id="password"
            [type]="showPw() ? 'text' : 'password'"
            formControlName="password"
            class="field__input"
            [class.field__input--error]="form.controls.password.invalid && form.controls.password.touched"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" (click)="showPw.set(!showPw())"
                  [attr.aria-label]="showPw() ? 'Passwort verbergen' : 'Passwort anzeigen'">
            {{ showPw() ? '🙈' : '👁' }}
          </button>
        </div>
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span class="field__error">Passwort erforderlich</span>
        }
      </div>

      @if (error()) {
        <div class="login-error" role="alert">{{ error() }}</div>
      }

      <button type="submit" class="login-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="btn-spinner"></span>
        } @else {
          Anmelden
        }
      </button>

    </form>
  </div>
</div>
